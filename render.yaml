# Deploy from repo root: Render Dashboard → New → Blueprint → connect this repo
# Or: New Web Service → Root Directory = apps/backend (same commands below)
services:
  - type: web
    name: remi-backend
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
